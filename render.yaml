# render.yaml
services:
  - type: web
    name: readers-hub-api
    runtime: python
    repo: https://github.com/Tarex-ma/readers-hub-api  
    plan: free
    region: oregon  # or singapore, frankfurt, ohio
    branch: main
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
    startCommand: gunicorn book_review_project.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: readers-hub-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true  # Render generates a secure random value
      - key: DJANGO_SETTINGS_MODULE
        value: book_review_project.settings_production
      - key: WEB_CONCURRENCY
        value: 4
      - key: ALLOWED_HOSTS
        value: ${RENDER_EXTERNAL_HOSTNAME}
      - key: CORS_ALLOWED_ORIGINS
        value: https://your-react-frontend.com  # Change later
      - key: PYTHON_VERSION
        value: 3.13.5 

databases:
  - name: readers-hub-db
    plan: free
    region: oregon
    databaseName: readershub  # optional
    user: readershub_user      # optional